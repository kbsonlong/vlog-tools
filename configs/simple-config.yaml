s3:
  endpoint: "minio:9000"     # 或 s3.amazonaws.com / 你的对象存储地址
  bucket: "vlog-archive"
  region: "us-east-1"
  use_ssl: false
  env_auth: false
  provider: ""
  force_path_style: false
  use_unsigned_payload: true
  http_proxy: ""
  rclone_log_level: ""
  rclone_dump: ""
  access_key: "minioadmin"
  secret_key: "minioadmin"

archive:
  update_metadata: false     # sidecar 强烈建议 false
  cron: "0 9 * * *"
  partition_offset_days: 1
  partition_timezone: "UTC"
  partition_auth_key: ""
  node_url: "http://127.0.0.1:9428"
  source_data_path: "/var/lib/victorialogs"
