apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vlstorage
spec:
  template:
    spec:
      containers:
      - name: vlstorage
        volumeMounts:
        - name: data
          mountPath: /var/lib/victorialogs
      - name: vlog-tools-archiver
        image: your-registry/vlog-tools:latest
        args:
        - "serve"
        - "archive"
        - "--cron=0 9 * * *"
        - "--offset-days=1"
        - "--partition-timezone=UTC"
        - "--node-url=http://127.0.0.1:9428"
        - "--source-path=/var/lib/victorialogs"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: TZ
          value: "Asia/Shanghai"
        volumeMounts:
        - name: data
          mountPath: /var/lib/victorialogs
        - name: config
          mountPath: /etc/vlog-tools
      volumes: []
