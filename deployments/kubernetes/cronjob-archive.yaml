apiVersion: batch/v1
kind: CronJob
metadata:
  name: vlog-archive
  namespace: monitoring
spec:
  schedule: "0 9 * * *"  # Asia/Shanghai 09:00，归档昨天 UTC 分区
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: vlog-tools
          containers:
          - name: archiver
            image: your-registry/vlog-tools:latest
            command: ["vlog-tools", "serve", "archive"]
            args:
            - "--once"
            - "--offset-days=1"
            - "--partition-timezone=UTC"
            - "--node-url=http://vlstorage-0:9428"
            - "--source-path=/tmp/vlog-data/node-0"
            volumeMounts:
            - name: hot-node-0-data
              mountPath: /tmp/vlog-data/node-0
              readOnly: true
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: hot-node-0-data
            persistentVolumeClaim:
              claimName: vlstorage-data-vlstorage-0
              readOnly: true
          - name: tmp
            emptyDir:
              sizeLimit: 5Gi
          restartPolicy: OnFailure
